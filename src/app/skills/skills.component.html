<div class="wrapper">

      <p class="tag">{{skill.name}}</p>
      <table class="rank">
        <tr class="marker">
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
        </tr>

      </table>
    </div>
  </div>
</div>
