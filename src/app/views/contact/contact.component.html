<div class="wrapper">
  <div class="contact-form">
    <form [formGroup]="formData" (ngSubmit)="onSubmit(formData.value)">
      <div class="form-group">
        <label for="Email">Email</label>
        <input id="Email" type="email" class="form-control" name="Email" placeholder="name@example.com" formControlName="Email">
      </div>
      <div class="form-group">
        <label for="Name">Full Name</label>
        <input id="Name" type="text" class="form-control" name="Name" placeholder="Johnny Appleseed" formControlName="Name">
      </div>
      <div class="form-group">
        <label for="Comment">Comment</label>
        <textarea id="Comment" class="form-control" formControlName="Comment" placeholder="Hello!" name="Comment"></textarea>
      </div>
      <button type="submit" class="btn btn-primary" [disabled]="!formData.valid">Submit</button>
    </form>
  </div>
</div>
