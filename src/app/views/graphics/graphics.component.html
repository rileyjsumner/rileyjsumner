<div class="wrapper animate__animated animate__backInUp">
  <div class="wrapper-content">
    <h3>Graphics Samples</h3>
    <div class="graphics">
      <div class="graphic {{graphic.orientation}} shadow" *ngFor="let graphic of graphics">
        <img src="assets/images/graphics/{{graphic.fileName}}" alt="{{graphic.title}}"/>
        <h4>{{graphic.title}}</h4>
        <p>{{graphic.summary}}</p>
      </div>
    </div>
  </div>
</div>
